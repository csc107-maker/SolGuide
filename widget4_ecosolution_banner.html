<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에코솔루션 광고 배너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #fff; }
  .banner { background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 50%, #E3F2FD 100%); border: 1.5px solid #A5D6A7; border-radius: 18px; padding: 28px 32px; max-width: 680px; margin: 0 auto; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .logo-area { flex-shrink: 0; }
  .logo-circle { width: 68px; height: 68px; border-radius: 50%; background: #2E7D32; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .logo-circle .eco { font-size: 10px; font-weight: 700; color: #C8E6C9; letter-spacing: 1px; }
  .logo-circle .sol { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 0.5px; }
  .logo-circle .sun { font-size: 20px; }
  .content { flex: 1; min-width: 220px; }
  .kicker { display: inline-block; background: #43A047; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.5px; }
  .content h3 { font-size: 18px; font-weight: 700; color: #1B5E20; line-height: 1.4; margin-bottom: 8px; }
  .content p { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 14px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .tag { background: #fff; border: 1px solid #A5D6A7; color: #388E3C; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
  .cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-main { background: #2E7D32; color: #fff; border: none; border-radius: 10px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
  .btn-sub { background: #fff; color: #388E3C; border: 1.5px solid #66BB6A; border-radius: 10px; padding: 10px 22px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
  .stat-box { flex-shrink: 0; background: #fff; border-radius: 14px; border: 1px solid #C8E6C9; padding: 16px 20px; text-align: center; min-width: 130px; }
  .stat-box .s-num { font-size: 26px; font-weight: 700; color: #1B5E20; }
  .stat-box .s-unit { font-size: 13px; font-weight: 400; }
  .stat-box .s-desc { font-size: 11px; color: #888; margin-top: 4px; }
  .divider { width: 1px; background: #C8E6C9; height: 60px; align-self: center; flex-shrink: 0; }
  @media(max-width: 520px) { .banner { flex-direction: column; align-items: flex-start; } .divider { display: none; } }
</style>
</head>
<body>
<div class="banner">
  <div class="logo-area">
    <div class="logo-circle">
      <span class="sun">☀️</span>
      <span class="eco">ECO</span>
      <span class="sol">SOLUTION</span>
    </div>
  </div>
  <div class="content">
    <div class="kicker">태양광 + 에너지 재테크 전문</div>
    <h3>에코솔루션 블로그<br>지금 바로 구독하세요</h3>
    <p>SMP·REC 최신 단가 분석부터 보조금 신청법, 실제 발전 수익까지.<br>태양광에 관한 모든 것을 가장 빠르게 정리해드립니다.</p>
    <div class="tags">
      <span class="tag">📊 매월 SMP 분석</span>
      <span class="tag">💰 수익 계산</span>
      <span class="tag">🏠 보조금 정보</span>
      <span class="tag">📈 에너지 재테크</span>
    </div>
    <div class="cta-row">
      <a href="https://blog.naver.com/ecosolution1218" class="btn-main" target="_blank">블로그 방문하기 →</a>
      <a href="https://blog.naver.com/ecosolution1218" class="btn-sub" target="_blank">구독하기</a>
    </div>
  </div>
  <div class="divider"></div>
  <div class="stat-box">
    <div class="s-num">119<span class="s-unit">원</span></div>
    <div class="s-desc">4월 SMP 최신 단가</div>
    <div style="height:12px;"></div>
    <div class="s-num">16<span class="s-unit">%↑</span></div>
    <div class="s-desc">3개월 수익 증가율</div>
  </div>
</div>
</body>
</html>
