  .hb-interest-btn { width: 100%; padding: 12px; border-radius: 14px; color: #fff; background: #B5462F; font-weight: 900; font-size: 13.5px; display: flex; align-items: center; justify-content: center; gap: 7px; margin-bottom: 10px; }

  .hb-interest-box p { font-size: 13px; font-weight: 700; margin: 0 0 10px; }
  .hb-interest-box input { margin-bottom: 8px; }
  .hb-interest-submit { width: 100%; padding: 10px; border-radius: 12px; color: #fff; background: #B5462F; font-weight: 700; font-size: 13px; }

  .hb-interested-list-title { font-size: 11.5px; font-weight: 700; color: #746F60; margin: 0 0 8px; }
  .hb-interested-row { display: flex; justify-content: space-between; background: #fff; border: 1px solid #EAE0C8; border-radius: 12px; padding: 9px 13px; font-size: 13px; margin-bottom: 6px; }
  .hb-interested-row b { font-weight: 700; }
  .hb-interested-row span { color: #746F60; }

  .hb-delete-btn { width: 100%; padding: 10px; border-radius: 12px; color: #B5462F; background: #F6DED4; font-weight: 700; font-size: 12.5px; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; }

  .hb-spin { display: inline-block; animation: hbspin .8s linear infinite; }
  @keyframes hbspin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .hb-cta-grid, .hb-steps-grid, .hb-channels-grid, .hb-listing-grid { grid-template-columns: 1fr; }
    .hb-h1 { font-size: 23px; }
    .hb-logo-tag { display: none; }
    .hb-stats-bar { flex-wrap: wrap; gap: 10px; }
  }
</style>

<script>
(function () {
  'use strict';

  /* ============ 데이터 ============ */
  var CHANNELS = [
    { icon: 'ti-building-bank', title: '농지은행 임대수탁사업', desc: '한국농어촌공사 · 직접 경작 어려운 농지를 위탁·임대', url: 'https://www.fbo.or.kr', tag: '공식 사이트' },
    { icon: 'ti-home', title: '귀농귀촌종합센터 · 그린대로', desc: '귀농 희망자 DB, 농지·주거 상담 원스톱', url: 'https://www.greendaero.go.kr', tag: '공식 사이트' },
    { icon: 'ti-plant-2', title: '스마트팜코리아', desc: '실증단지 입주농업인 공개모집 방식', url: 'https://www.smartfarmkorea.net', tag: '공식 사이트' },
    { icon: 'ti-users', title: '지역 농협 · 작목반 · 영농조합법인', desc: '이미 조직화된 농업인 네트워크', url: 'https://search.naver.com/search.naver?query=지역+농협+작목반+영농조합법인', tag: '검색으로 찾기' },
    { icon: 'ti-building-community', title: '시군 농업기술센터', desc: '신규 농업경영체 등록 대기 수요 파악', url: 'https://search.naver.com/search.naver?query=시군+농업기술센터', tag: '검색으로 찾기' },
    { icon: 'ti-message-circle', title: '온라인 귀농귀촌 커뮤니티', desc: '네이버 카페 · 밴드 등 정보 공유', url: 'https://section.cafe.naver.com/ca-fe/home/search/article?q=%EA%B7%80%EB%86%8D%EA%B7%80%EC%B4%8C', tag: '검색으로 찾기' },
    { icon: 'ti-brand-youtube', title: '귀농 유튜브 채널', desc: '새 소득모델 콘텐츠 협업 소재', url: 'https://www.youtube.com/results?search_query=귀농+영농형태양광', tag: '검색으로 찾기' },
    { icon: 'ti-school', title: '지역 대학 농업계열 학과', desc: '청년 인력 · 인턴십 연계', url: 'https://search.naver.com/search.naver?query=지역+대학교+농업계열학과', tag: '검색으로 찾기' },
    { icon: 'ti-briefcase', title: '시니어 재취업지원센터', desc: '5060 은퇴자 세컨드라이프 인력', url: 'https://search.naver.com/search.naver?query=시니어+재취업지원센터', tag: '검색으로 찾기' }
  ];
  var NEED_TYPES = ['임차농 구함', '협동조합원 모집', '위탁영농 파트너 구함', '상담 후 결정'];
  var EXPERIENCE_LEVELS = ['농사 경험 없음 (입문)', '1~3년', '3~10년', '10년 이상 (전업농)'];
  var TENANCY_WISH = ['임차 희망 (땅이 필요해요)', '위탁영농 참여 희망', '협동조합원 참여 희망', '상담 후 결정'];
  var STORAGE_KEY = 'habat_listings_v1';
  var MINE_KEY = 'habat_mine_v1';

  /* ============ 상태 ============ */
  var state = {
    view: 'home',
    role: 'land',
    filterRole: 'all',
    regionQuery: '',
    listings: [],
    detailId: null,
    showInterestBox: false,
    saving: false
  };
  var myListingIds = [];

  /* ============ 저장소 (localStorage — 이 브라우저에만 저장됨) ============ */
  function loadListings() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      state.listings = raw ? JSON.parse(raw) : [];
    } catch (e) { state.listings = []; }
    try {
      var mine = localStorage.getItem(MINE_KEY);
      myListingIds = mine ? JSON.parse(mine) : [];
    } catch (e) { myListingIds = []; }
  }
  function saveListings() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.listings)); }
    catch (e) { showToast('저장에 실패했어요. 브라우저 저장공간을 확인해주세요.'); }
  }
  function saveMine() {
    try { localStorage.setItem(MINE_KEY, JSON.stringify(myListingIds)); } catch (e) {}
  }

  /* ============ 유틸 ============ */
  function esc(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtDate(iso) {
    var d = new Date(iso);
    return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
  }
  function uid() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('hb-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2800);
  }

  /* ============ 렌더: 전체 뷰 스위치 ============ */
  function render() {
    var app = document.getElementById('hb-app');
    if (state.view === 'home') app.innerHTML = renderHome();
    else if (state.view === 'browse') app.innerHTML = renderBrowseShell();
    else if (state.view === 'form') app.innerHTML = renderForm();
    if (state.view === 'browse') renderBrowseList();
    renderModal();
  }

  /* ============ 헤더(공통) ============ */
  function headerHtml() {
    return '' +
      '<div class="hb-header">' +
      '<button class="hb-logo" onclick="HB.go(\'home\')">' +
      '<span class="hb-logo-dot"><i class="ti ti-sun"></i></span>' +
      '<span class="hb-logo-text hb-serif">해밭</span>' +
      '<span class="hb-logo-tag">영농형 태양광 매칭</span>' +
      '</button>' +
      '<div class="hb-nav">' +
      '<button class="hb-nav-btn' + (state.view === 'browse' ? ' active' : '') + '" onclick="HB.go(\'browse\')">둘러보기</button>' +
      '<button class="hb-nav-cta" onclick="HB.go(\'form\')"><i class="ti ti-plus"></i> 등록하기</button>' +
      '</div></div>';
  }

  /* ============ 홈 뷰 ============ */
  function renderHome() {
    var landCount = state.listings.filter(function (l) { return l.role === 'land'; }).length;
    var farmerCount = state.listings.filter(function (l) { return l.role === 'farmer'; }).length;

    var channelsHtml = CHANNELS.map(function (c) {
      return '<a class="hb-channel-card" href="' + esc(c.url) + '" target="_blank" rel="noopener noreferrer">' +
        '<div class="hb-channel-top"><span class="hb-channel-icon"><i class="ti ' + c.icon + '"></i></span><i class="ti ti-external-link" style="color:#746F60;font-size:14px;"></i></div>' +
        '<p class="hb-channel-title">' + esc(c.title) + '</p>' +
        '<p class="hb-channel-desc">' + esc(c.desc) + '</p>' +
        '<span class="hb-channel-tag">' + esc(c.tag) + '</span>' +
        '</a>';
    }).join('');

    return headerHtml() +
      '<div class="hb-limit-note"><i class="ti ti-alert-triangle" style="flex-shrink:0;margin-top:2px;"></i>' +
      '<span><b>이용 전 꼭 확인하세요.</b> 이 페이지는 <b>이 브라우저(기기)에만</b> 데이터를 저장합니다. 다른 사람의 등록 글은 그 사람이 직접 이 페이지에 등록해야 여기 표시되며, 서로 다른 방문자의 글이 자동으로 한곳에 모이지 않습니다. 여러 사람이 실시간으로 같은 목록을 보고 등록하는 형태가 필요하다면, Claude 아티팩트 버전(공유 저장소 사용)을 함께 활용해주세요.</span></div>' +
      '<div class="hb-section">' +
      '<div style="text-align:center;">' +
      '<span class="hb-badge-warn"><i class="ti ti-map-pin"></i> 의성군 파일럿 · 전국 등록 가능</span>' +
      '</div>' +
      '<h1 class="hb-h1 hb-serif">땅은 있는데 농사지을 사람이 없나요?</h1>' +
      '<p class="hb-sub">영농형 태양광을 하고 싶은 땅 주인과, 농사만 짓고 싶은 사람을 잇습니다.<br>등록하면 이 브라우저에 바로 저장돼요.</p>' +
      '<div class="hb-cta-grid">' +
      '<button class="hb-cta-card" onclick="HB.chooseRole(\'land\')">' +
      '<span class="hb-cta-icon" style="background:#FBEBC7;color:#8F5C08;"><i class="ti ti-sun"></i></span>' +
      '<p class="hb-cta-title">땅이 있어요</p>' +
      '<p class="hb-cta-desc">영농형 태양광은 하고 싶은데 농사지을 사람이 없는 사업자 · 토지주</p>' +
      '<span class="hb-cta-link" style="color:#8F5C08;">사업자로 등록 <i class="ti ti-arrow-right"></i></span>' +
      '</button>' +
      '<button class="hb-cta-card" onclick="HB.chooseRole(\'farmer\')">' +
      '<span class="hb-cta-icon" style="background:#E1EBDD;color:#2F5233;"><i class="ti ti-plant-2"></i></span>' +
      '<p class="hb-cta-title">농사짓고 싶어요</p>' +
      '<p class="hb-cta-desc">땅은 없지만 임차 · 위탁영농 · 협동조합 형태로 실제 경작을 맡고 싶은 분</p>' +
      '<span class="hb-cta-link" style="color:#2F5233;">농사 희망으로 등록 <i class="ti ti-arrow-right"></i></span>' +
      '</button>' +
      '</div>' +
      '<div class="hb-stats-bar">' +
      '<div class="hb-stats-nums">' +
      '<div><p class="hb-stat-num hb-serif" style="color:#8F5C08;">' + landCount + '</p><p class="hb-stat-label">땅 있어요</p></div>' +
      '<div><p class="hb-stat-num hb-serif" style="color:#2F5233;">' + farmerCount + '</p><p class="hb-stat-label">농사 희망</p></div>' +
      '</div>' +
      '<button class="hb-stats-link" onclick="HB.go(\'browse\')">전체 둘러보기 <i class="ti ti-arrow-right"></i></button>' +
      '</div>' +
      '<p class="hb-block-title">이렇게 이용해보세요</p>' +
      '<p class="hb-block-sub">회원가입 없이 3단계면 끝나요.</p>' +
      '<div class="hb-steps-grid">' +
      '<div class="hb-step-card"><span class="hb-step-num">1</span><p class="hb-step-title">등록하기</p><p class="hb-step-desc">땅 정보 또는 농사 희망 조건을 남겨주세요.</p></div>' +
      '<div class="hb-step-card"><span class="hb-step-num">2</span><p class="hb-step-title">둘러보기</p><p class="hb-step-desc">반대편 등록자를 지역별로 찾아보세요.</p></div>' +
      '<div class="hb-step-card"><span class="hb-step-num">3</span><p class="hb-step-title">관심 남기기</p><p class="hb-step-desc">연락 방법을 남기면 상대가 직접 연락해요.</p></div>' +
      '</div>' +
      '<p class="hb-block-title">공식 지원제도 · 채널 바로가기</p>' +
      '<p class="hb-block-sub">이 페이지와 함께 활용하면 좋은 9가지 실전 채널입니다.</p>' +
      '<div class="hb-channels-grid">' + channelsHtml + '</div>' +
      '</div>' +
      '<div class="hb-disclaimer"><i class="ti ti-info-circle" style="flex-shrink:0;margin-top:2px;"></i>' +
      '<span>등록 정보는 이 기기의 브라우저 저장소에만 남습니다. 실제 계약 전에는 반드시 신원과 조건을 직접 확인하시고, 연락처는 전화번호 대신 오픈채팅 링크처럼 공개해도 부담 없는 방식을 권장합니다. 영농형태양광법 하위법령 확정 전이므로 사업 추진 전 관련 기관에 재확인해주세요.</span></div>';
  }

  /* ============ 둘러보기 뷰(셸 + 리스트 분리 렌더) ============ */
  function renderBrowseShell() {
    return headerHtml() +
      '<div class="hb-back-row"><button class="hb-back-btn" onclick="HB.go(\'home\')"><i class="ti ti-chevron-left"></i></button><h2 class="hb-view-title">둘러보기</h2></div>' +
      '<div class="hb-filter-tabs">' +
      '<button class="hb-filter-btn' + (state.filterRole === 'all' ? ' active' : '') + '" onclick="HB.setFilterRole(\'all\')">전체</button>' +
      '<button class="hb-filter-btn' + (state.filterRole === 'land' ? ' active' : '') + '" onclick="HB.setFilterRole(\'land\')">땅 있어요</button>' +
      '<button class="hb-filter-btn' + (state.filterRole === 'farmer' ? ' active' : '') + '" onclick="HB.setFilterRole(\'farmer\')">농사 희망</button>' +
      '</div>' +
      '<div class="hb-search-wrap"><i class="ti ti-search hb-search-icon"></i>' +
      '<input class="hb-search-input" id="hb-region-input" placeholder="지역으로 검색 (예: 의성, 경북, 안동...)" oninput="HB.onRegionInput(this.value)" value="' + esc(state.regionQuery) + '"></div>' +
      '<div class="hb-list-wrap"><div id="hb-list-container"></div></div>';
  }

  function renderBrowseList() {
    var container = document.getElementById('hb-list-container');
    if (!container) return;
    var filtered = state.listings.filter(function (l) {
      var roleOk = state.filterRole === 'all' || l.role === state.filterRole;
      var regionOk = !state.regionQuery.trim() || (l.region || '').indexOf(state.regionQuery.trim()) !== -1;
      return roleOk && regionOk;
    });

    if (state.listings.length === 0) {
      container.innerHTML = '<div class="hb-empty"><div class="hb-empty-icon"><i class="ti ti-plant-2"></i></div>' +
        '<p style="font-weight:900;margin:0 0 6px;">아직 등록된 글이 없어요</p>' +
        '<p style="font-size:13px;color:#746F60;margin:0 0 18px;">첫 번째로 등록해서 매칭을 시작해보세요.</p>' +
        '<button class="hb-nav-cta" style="display:inline-flex;" onclick="HB.go(\'form\')"><i class="ti ti-plus"></i> 지금 등록하기</button></div>';
      return;
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div class="hb-empty"><p style="font-weight:900;margin:0;">조건에 맞는 글이 없어요</p><p style="font-size:13px;color:#746F60;margin:6px 0 0;">필터나 지역 검색어를 바꿔보세요.</p></div>';
      return;
    }

    container.innerHTML = '<div class="hb-listing-grid">' + filtered.map(function (l) {
      var summary = l.role === 'land'
        ? (l.areaPyeong ? esc(l.areaPyeong) + '평 · ' : '') + esc(l.needType)
        : esc(l.experience) + ' · ' + esc(l.tenancyWish);
      return '<button class="hb-listing-card" onclick="HB.openDetail(\'' + l.id + '\')">' +
        '<div class="hb-listing-top"><span class="hb-role-badge ' + l.role + '"><i class="ti ' + (l.role === 'land' ? 'ti-sun' : 'ti-plant-2') + '"></i>' + (l.role === 'land' ? '땅 있어요' : '농사 희망') + '</span><span class="hb-listing-date">' + fmtDate(l.createdAt) + '</span></div>' +
        '<p class="hb-listing-name">' + esc(l.name) + '</p>' +
        '<p class="hb-listing-region"><i class="ti ti-map-pin"></i> ' + esc(l.region) + '</p>' +
        '<p class="hb-listing-desc">' + summary + '</p>' +
        '<span class="hb-listing-interest"><i class="ti ti-heart"></i> 관심 ' + ((l.interested && l.interested.length) || 0) + '</span>' +
        '</button>';
    }).join('') + '</div>';
  }

  /* ============ 등록 폼 ============ */
  function renderForm() {
    var isLand = state.role === 'land';
    var roleFields = isLand ? (
      '<label class="hb-field"><span class="hb-field-label">면적(평)</span><input class="hb-input" id="f-area" placeholder="예: 1300" inputmode="numeric"></label>' +
      '<label class="hb-field"><span class="hb-field-label">지목 / 현재 작물</span><input class="hb-input" id="f-landtype" placeholder="예: 전(밭), 마늘 재배 중"></label>' +
      '<label class="hb-field"><span class="hb-field-label">필요한 형태<span class="req"> *</span></span><select class="hb-select" id="f-needtype">' + NEED_TYPES.map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select></label>'
    ) : (
      '<label class="hb-field"><span class="hb-field-label">영농 경험<span class="req"> *</span></span><select class="hb-select" id="f-experience">' + EXPERIENCE_LEVELS.map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select></label>' +
      '<label class="hb-field"><span class="hb-field-label">관심 있는 작물</span><input class="hb-input" id="f-crop" placeholder="예: 마늘, 고구마, 무관"></label>' +
      '<label class="hb-field"><span class="hb-field-label">희망 형태<span class="req"> *</span></span><select class="hb-select" id="f-tenancy">' + TENANCY_WISH.map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select></label>'
    );

    return headerHtml() +
      '<div class="hb-back-row"><button class="hb-back-btn" onclick="HB.go(\'home\')"><i class="ti ti-chevron-left"></i></button><h2 class="hb-view-title">등록하기</h2></div>' +
      '<div class="hb-form-shell">' +
      '<div class="hb-role-toggle">' +
      '<button class="' + (isLand ? 'active land' : '') + '" onclick="HB.setFormRole(\'land\')"><i class="ti ti-sun"></i> 땅이 있어요</button>' +
      '<button class="' + (!isLand ? 'active farmer' : '') + '" onclick="HB.setFormRole(\'farmer\')"><i class="ti ti-plant-2"></i> 농사짓고 싶어요</button>' +
      '</div>' +
      '<div class="hb-limit-note"><i class="ti ti-info-circle" style="flex-shrink:0;margin-top:2px;"></i><span>입력한 정보는 <b>이 브라우저(기기)</b>에 저장됩니다. 전화번호보다는 오픈채팅 링크나 이메일처럼 공개해도 괜찮은 연락 방법을 추천해요.</span></div>' +
      '<label class="hb-field"><span class="hb-field-label">이름 / 담당자명<span class="req"> *</span></span><input class="hb-input" id="f-name" placeholder="예: 김의성"></label>' +
      '<label class="hb-field"><span class="hb-field-label">지역<span class="req"> *</span></span><input class="hb-input" id="f-region" placeholder="예: 경북 의성군"></label>' +
      roleFields +
      '<label class="hb-field"><span class="hb-field-label">연락 방법<span class="req"> *</span></span><input class="hb-input" id="f-contact" placeholder="오픈채팅 링크, 이메일 등"></label>' +
      '<label class="hb-field"><span class="hb-field-label">한마디 소개</span><textarea class="hb-textarea" id="f-intro" placeholder="상대방이 알아두면 좋을 내용을 자유롭게 적어주세요."></textarea></label>' +
      '<button class="hb-submit-btn ' + state.role + '" id="hb-submit-btn" onclick="HB.submitForm()"><i class="ti ti-check"></i> 등록 완료하기</button>' +
      '</div>';
  }

  /* ============ 상세 모달 ============ */
  function renderModal() {
    var root = document.getElementById('hb-modal-root');
    if (!state.detailId) { root.innerHTML = ''; return; }
    var l = state.listings.filter(function (x) { return x.id === state.detailId; })[0];
    if (!l) { state.detailId = null; root.innerHTML = ''; return; }

    var gridHtml = l.role === 'land' ? (
      '<div><p class="lbl">면적</p><p class="val">' + (l.areaPyeong ? esc(l.areaPyeong) + '평' : '미기재') + '</p></div>' +
      '<div><p class="lbl">지목/작물</p><p class="val">' + esc(l.landType || '미기재') + '</p></div>' +
      '<div class="full"><p class="lbl">필요한 형태</p><p class="val">' + esc(l.needType) + '</p></div>'
    ) : (
      '<div><p class="lbl">영농 경험</p><p class="val">' + esc(l.experience) + '</p></div>' +
      '<div><p class="lbl">관심 작물</p><p class="val">' + esc(l.preferredCrop || '무관') + '</p></div>' +
      '<div class="full"><p class="lbl">희망 형태</p><p class="val">' + esc(l.tenancyWish) + '</p></div>'
    );

    var interestedHtml = '';
    if (l.interested && l.interested.length) {
      interestedHtml = '<p class="hb-interested-list-title">관심을 남긴 사람 (' + l.interested.length + ')</p>' +
        l.interested.map(function (p) {
          return '<div class="hb-interested-row"><b>' + esc(p.name) + '</b><span>' + esc(p.contact) + '</span></div>';
        }).join('');
    }

    var interestSection = state.showInterestBox
      ? '<div class="hb-interest-box"><p>내 연락처를 남기면 게시자가 직접 연락해요</p>' +
        '<input class="hb-input" id="hb-int-name" placeholder="이름">' +
        '<input class="hb-input" id="hb-int-contact" placeholder="연락 방법 (오픈채팅, 이메일 등)">' +
        '<button class="hb-interest-submit" onclick="HB.submitInterest(\'' + l.id + '\')">남기기</button></div>'
      : '<button class="hb-interest-btn" onclick="HB.showInterestBox()"><i class="ti ti-heart"></i> 관심 남기기</button>';

    var deleteBtn = myListingIds.indexOf(l.id) !== -1
      ? '<button class="hb-delete-btn" onclick="HB.deleteListing(\'' + l.id + '\')"><i class="ti ti-trash"></i> 내 등록 삭제하기</button>'
      : '';

    root.innerHTML = '<div class="hb-modal-overlay" onclick="HB.closeDetail(event)">' +
      '<div class="hb-modal" onclick="event.stopPropagation()">' +
      '<div class="hb-modal-top"><span class="hb-role-badge ' + l.role + '"><i class="ti ' + (l.role === 'land' ? 'ti-sun' : 'ti-plant-2') + '"></i>' + (l.role === 'land' ? '땅 있어요' : '농사 희망') + '</span><button class="hb-modal-close" onclick="HB.closeDetail()"><i class="ti ti-x"></i></button></div>' +
      '<p class="hb-modal-name hb-serif">' + esc(l.name) + '</p>' +
      '<p class="hb-modal-region"><i class="ti ti-map-pin"></i> ' + esc(l.region) + ' · ' + fmtDate(l.createdAt) + ' 등록</p>' +
      '<div class="hb-modal-grid">' + gridHtml + '</div>' +
      (l.intro ? '<p class="hb-modal-intro-lbl">소개</p><p class="hb-modal-intro">' + esc(l.intro) + '</p>' : '') +
      '<div class="hb-modal-contact"><p class="lbl">연락 방법</p><p class="val">' + esc(l.contact) + '</p></div>' +
      interestSection + interestedHtml + deleteBtn +
      '</div></div>';
  }

  /* ============ 액션 (전역 노출) ============ */
  window.HB = {
    go: function (v) { state.view = v; state.detailId = null; window.scrollTo(0, 0); render(); },

    chooseRole: function (r) { state.role = r; state.view = 'form'; window.scrollTo(0, 0); render(); },

    setFormRole: function (r) { state.role = r; render(); },

    setFilterRole: function (r) { state.filterRole = r; renderBrowseShellAndKeepFocusless(); },

    onRegionInput: function (v) { state.regionQuery = v; renderBrowseList(); },

    submitForm: function () {
      var name = (document.getElementById('f-name') || {}).value || '';
      var region = (document.getElementById('f-region') || {}).value || '';
      var contact = (document.getElementById('f-contact') || {}).value || '';
      var intro = (document.getElementById('f-intro') || {}).value || '';
      if (!name.trim() || !region.trim() || !contact.trim()) {
        showToast('이름 · 지역 · 연락 방법은 꼭 입력해주세요.');
        return;
      }
      var item = { id: uid(), role: state.role, name: name, region: region, contact: contact, intro: intro, interested: [], createdAt: new Date().toISOString() };
      if (state.role === 'land') {
        item.areaPyeong = (document.getElementById('f-area') || {}).value || '';
        item.landType = (document.getElementById('f-landtype') || {}).value || '';
        item.needType = (document.getElementById('f-needtype') || {}).value || NEED_TYPES[0];
      } else {
        item.experience = (document.getElementById('f-experience') || {}).value || EXPERIENCE_LEVELS[0];
        item.preferredCrop = (document.getElementById('f-crop') || {}).value || '';
        item.tenancyWish = (document.getElementById('f-tenancy') || {}).value || TENANCY_WISH[0];
      }
      state.listings = [item].concat(state.listings);
      saveListings();
      myListingIds.push(item.id);
      saveMine();
      state.filterRole = state.role;
      state.view = 'browse';
      window.scrollTo(0, 0);
      render();
      showToast('등록됐어요! 이 브라우저에서 언제든 다시 볼 수 있어요.');
    },

    openDetail: function (id) { state.detailId = id; state.showInterestBox = false; renderModal(); },
    closeDetail: function (e) { state.detailId = null; state.showInterestBox = false; renderModal(); },
    showInterestBox: function () { state.showInterestBox = true; renderModal(); },

    submitInterest: function (id) {
      var name = (document.getElementById('hb-int-name') || {}).value || '';
      var contact = (document.getElementById('hb-int-contact') || {}).value || '';
      if (!name.trim() || !contact.trim()) { showToast('이름과 연락 방법을 남겨주세요.'); return; }
      state.listings = state.listings.map(function (l) {
        if (l.id !== id) return l;
        var interested = (l.interested || []).concat([{ name: name, contact: contact, at: new Date().toISOString() }]);
        return Object.assign({}, l, { interested: interested });
      });
      saveListings();
      state.showInterestBox = false;
      renderModal();
      if (state.view === 'browse') renderBrowseList();
      showToast('관심을 남겼어요! (이 브라우저에만 저장되니, 게시자가 같은 기기로 확인해야 보여요)');
    },

    deleteListing: function (id) {
      state.listings = state.listings.filter(function (l) { return l.id !== id; });
      saveListings();
      myListingIds = myListingIds.filter(function (x) { return x !== id; });
      saveMine();
      state.detailId = null;
      renderModal();
      if (state.view === 'browse') renderBrowseList();
      showToast('등록을 삭제했어요.');
    }
  };

  function renderBrowseShellAndKeepFocusless() {
    // 필터 탭 클릭은 검색창 포커스와 무관하므로 셸 전체를 다시 그려도 안전함
    document.getElementById('hb-app').innerHTML = renderBrowseShell();
    renderBrowseList();
  }

  /* ============ 시작 ============ */
  loadListings();
  render();
})();
</script>

</body>
</html>
